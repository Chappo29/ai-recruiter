services:
  db:
    image: postgres:16-alpine
    container_name: recruiter-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruiter
    ports:
      - "5432:5432"
    volumes:
      - recruiter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruiter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  recruiter_pgdata:
